services:
  redis:
    image: redis:alpine
    container_name: nomadiq-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: nomadiq-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_MINUTES=${ACCESS_TOKEN_MINUTES}
      - REFRESH_TOKEN_DAYS=${REFRESH_TOKEN_DAYS}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_API_KEY=${LLM_API_KEY}
      - EMBEDDINGS_BASE_URL=${EMBEDDINGS_BASE_URL}
      - EMBEDDINGS_MODEL_NAME=${EMBEDDINGS_MODEL_NAME}
      - EMBEDDINGS_API_KEY=${EMBEDDINGS_API_KEY}
      - MCP_ENABLED=${MCP_ENABLED}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_GOOGLE_MAPS_SERVER_URL=${MCP_GOOGLE_MAPS_SERVER_URL}
      - MCP_COMPOSIO_SERVER_URL=${MCP_COMPOSIO_SERVER_URL}
      - MCP_CUSTOM_SERVER_URL=${MCP_CUSTOM_SERVER_URL}
      - MCP_TOOL_GOOGLE_PLACES_CITY=${MCP_TOOL_GOOGLE_PLACES_CITY}
      - MCP_TOOL_GOOGLE_PLACES_NEARBY=${MCP_TOOL_GOOGLE_PLACES_NEARBY}
      - MCP_TOOL_GOOGLE_ROUTES_TRANSIT=${MCP_TOOL_GOOGLE_ROUTES_TRANSIT}
      - MCP_TOOL_TICKETMASTER_EVENTS=${MCP_TOOL_TICKETMASTER_EVENTS}
      - MCP_TOOL_OPENWEATHER_FORECAST=${MCP_TOOL_OPENWEATHER_FORECAST}
      - MCP_TOOL_EXCHANGE_RATES=${MCP_TOOL_EXCHANGE_RATES}
      - MCP_TOOL_NUMBEO_BASELINE=${MCP_TOOL_NUMBEO_BASELINE}
      - MCP_TOOL_AMADEUS_SAFETY=${MCP_TOOL_AMADEUS_SAFETY}
      - MCP_TOOL_CLIMATIQ_EMISSIONS=${MCP_TOOL_CLIMATIQ_EMISSIONS}
      - MCP_TOOL_RAG_ENRICH_CONTEXT=${MCP_TOOL_RAG_ENRICH_CONTEXT}
    depends_on:
      - redis
