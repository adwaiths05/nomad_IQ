services:
  redis:
    image: redis:alpine
    container_name: nomadiq-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: nomadiq-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_MINUTES=${ACCESS_TOKEN_MINUTES}
      - REFRESH_TOKEN_DAYS=${REFRESH_TOKEN_DAYS}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_API_KEY=${LLM_API_KEY}
      - EMBEDDINGS_BASE_URL=${EMBEDDINGS_BASE_URL}
      - EMBEDDINGS_MODEL_NAME=${EMBEDDINGS_MODEL_NAME}
      - EMBEDDINGS_API_KEY=${EMBEDDINGS_API_KEY}
      - EXCHANGE_RATE_API_KEY=${EXCHANGE_RATE_API_KEY}
      - EXCHANGE_RATE_BASE_URL=${EXCHANGE_RATE_BASE_URL}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - GOOGLE_PLACES_BASE_URL=${GOOGLE_PLACES_BASE_URL}
      - GOOGLE_ROUTES_API_KEY=${GOOGLE_ROUTES_API_KEY}
      - GOOGLE_ROUTES_BASE_URL=${GOOGLE_ROUTES_BASE_URL}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - OPENWEATHER_BASE_URL=${OPENWEATHER_BASE_URL}
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY}
      - TICKETMASTER_BASE_URL=${TICKETMASTER_BASE_URL}
      - AMADEUS_API_KEY=${AMADEUS_API_KEY}
      - AMADEUS_API_SECRET=${AMADEUS_API_SECRET}
      - AMADEUS_BASE_URL=${AMADEUS_BASE_URL}
      - CLIMATIQ_API_KEY=${CLIMATIQ_API_KEY}
      - CLIMATIQ_BASE_URL=${CLIMATIQ_BASE_URL}
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}
      - APIFY_BASE_URL=${APIFY_BASE_URL}
      - NUMBEO_APIFY_ACTOR_ID=${NUMBEO_APIFY_ACTOR_ID}
    depends_on:
      - redis
