services:
  redis:
    image: redis:7-alpine
    container_name: nomadiq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  mcp-travel:
    build:
      context: ./docker/mcp-bridge
      dockerfile: Dockerfile
    container_name: nomadiq-mcp-travel
    depends_on:
      redis:
        condition: service_healthy
    environment:
      MCP_COMMAND: python /workspace/apps/mcp_servers/transport_server.py
      MCP_STDIO_FRAMING: ndjson
      TRAVELPAYOUTS_API_TOKEN: ${TRAVELPAYOUTS_API_TOKEN:-}
      TRAVELPAYOUTS_BASE_URL: ${TRAVELPAYOUTS_BASE_URL:-https://api.travelpayouts.com/v1}
      PHOTON_BASE_URL: ${PHOTON_BASE_URL:-https://photon.komoot.io}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.project-osrm.org}
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY:-}
      AVIATIONSTACK_BASE_URL: ${AVIATIONSTACK_BASE_URL:-https://api.aviationstack.com/v1}
      OPENSKY_BASE_URL: ${OPENSKY_BASE_URL:-https://opensky-network.org/api}
    ports:
      - "9101:9000"
    volumes:
      - ./:/workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  mcp-rag:
    build:
      context: ./docker/mcp-bridge
      dockerfile: Dockerfile
    container_name: nomadiq-mcp-rag
    depends_on:
      redis:
        condition: service_healthy
    environment:
      MCP_COMMAND: python /workspace/apps/mcp_servers/rag_server.py
      MCP_STDIO_FRAMING: ndjson
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Neon PostgreSQL connection string}
    ports:
      - "9108:9000"
    volumes:
      - ./:/workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nomadiq-api
    depends_on:
      mcp-travel:
        condition: service_healthy
      mcp-rag:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Neon PostgreSQL connection string}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-30}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-14}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://model-runner.docker.internal/engines/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-ai/smollm2:360M-Q4_K_M}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://model-runner.docker.internal/engines/v1}
      EMBEDDINGS_MODEL_NAME: ${EMBEDDINGS_MODEL_NAME:-ai/nomic-embed-text-v1.5}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      MCP_ENABLED: ${MCP_ENABLED:-true}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      MCP_TRAVEL_URL: ${MCP_TRAVEL_URL:-http://mcp-travel:9000}
      MCP_RAG_URL: ${MCP_RAG_URL:-http://mcp-rag:9000}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      OPENWEATHER_BASE_URL: ${OPENWEATHER_BASE_URL:-https://api.openweathermap.org/data/2.5}
      OPENWEATHER_GEO_BASE_URL: ${OPENWEATHER_GEO_BASE_URL:-https://api.openweathermap.org/geo/1.0}
      OPENWEATHER_ONECALL_BASE_URL: ${OPENWEATHER_ONECALL_BASE_URL:-https://api.openweathermap.org/data/3.0}
      TICKETMASTER_API_KEY: ${TICKETMASTER_API_KEY:-}
      TICKETMASTER_BASE_URL: ${TICKETMASTER_BASE_URL:-https://app.ticketmaster.com/discovery/v2}
      EVENTBRITE_API_TOKEN: ${EVENTBRITE_API_TOKEN:-}
      EVENTBRITE_BASE_URL: ${EVENTBRITE_BASE_URL:-https://www.eventbriteapi.com/v3}
      EXCHANGE_API_BASE_URL: ${EXCHANGE_API_BASE_URL:-https://open.er-api.com/v6}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN:-}
      NUMBEO_CITY_COST_ACTOR_ID: ${NUMBEO_CITY_COST_ACTOR_ID:-}
      CLIMATIQ_API_KEY: ${CLIMATIQ_API_KEY:-}
      CLIMATIQ_BASE_URL: ${CLIMATIQ_BASE_URL:-https://api.climatiq.io}
      TRAVELPAYOUTS_API_TOKEN: ${TRAVELPAYOUTS_API_TOKEN:-}
      TRAVELPAYOUTS_BASE_URL: ${TRAVELPAYOUTS_BASE_URL:-https://api.travelpayouts.com/v1}
      SAFETY_SECONDARY_SIGNAL_ENABLED: ${SAFETY_SECONDARY_SIGNAL_ENABLED:-true}
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nomadiq-frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    volumes:
      - ./frontend:/app
      - frontend-node_modules:/app/node_modules
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    container_name: nomadiq-nginx
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  frontend-node_modules:
